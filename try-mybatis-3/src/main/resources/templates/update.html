<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시판-mybatis</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>게시판 게시글 수정</h1>
    <form th:action="@{|/update/${board.id}|}" method="post" name="updateForm">
      <p><input type="hidden" name="id" th:value="${board.id}" /></p>
      <p>제목: <input type="text" name="title" th:value="${board.title}" /></p>
      <p>
        작성자: <input type="text" name="writer" th:value="${board.writer}" />
      </p>
      <p>
        비밀번호: <input type="text" name="pass" th:value="${board.pass}" />
      </p>
      <textarea name="" id=""></textarea>
      <p>
        내용:
        <textarea
          name="contents"
          cols="30"
          rows="10"
          th:text="${contents}"
        ></textarea>
      </p>
      <p><input type="button" value="수정" onclick="frmUpdate()" /></p>
    </form>
  </body>
  <script th:inline="javascript">
    const frmUpdate = () => {
        const boardPass = document.getElementById("pass").value;
        const passDB = [[${board.pass}]];
        if(boardPass == passDB){
            updateForm.submit();
        }else{
            alert("비밀번호가 틀립니다 !!");
        }
    }
  </script>
</html>
